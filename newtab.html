<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="background-container"></div>
    <div class="background-overlay"></div>
    <div class="clock-container pos-center">
        <div class="time-display">
            <div class="time" id="time">00:00:00</div>
            <div class="date" id="date">Monday, January 1, 2024</div>
        </div>
        <div id="custom-texts-container" class="custom-texts-container"></div>
        <div class="settings">
            <button id="settings-btn" class="settings-btn">⚙️</button>
            <div id="settings-panel" class="settings-panel hidden">
                <h3>Settings</h3>
                <div class="settings-scroll-area">
                    <div class="settings-section">
                        <h4>Appearance</h4>
                        <label>
                            Clock Font:
                            <select id="clock-font">
                                <option value="Orbitron">Orbitron</option>
                                <option value="Rajdhani">Rajdhani</option>
                                <option value="Roboto">Roboto</option>
                                <option value="Open Sans">Open Sans</option>
                                <option value="Lato">Lato</option>
                                <option value="Montserrat">Montserrat</option>
                                <option value="Oswald">Oswald</option>
                                <option value="Raleway">Raleway</option>
                                <option value="Poppins">Poppins</option>
                                <option value="Inter">Inter</option>
                                <option value="Pacifico">Pacifico</option>
                                <option value="Bebas Neue">Bebas Neue</option>
                                <option value="Playfair Display">Playfair Display</option>
                                <option value="Merriweather">Merriweather</option>
                                <option value="Nunito">Nunito</option>
                                <option value="Ubuntu">Ubuntu</option>
                                <option value="Roboto Mono">Roboto Mono</option>
                                <option value="Dancing Script">Dancing Script</option>
                                <option value="Cinzel">Cinzel</option>
                                <option value="Josefin Sans">Josefin Sans</option>
                                <option value="Quicksand">Quicksand</option>
                                <option value="Anton">Anton</option>
                                <option value="Righteous">Righteous</option>
                                <option value="Lobster">Lobster</option>
                                <option value="Caveat">Caveat</option>
                                <option value="Exo 2">Exo 2</option>
                                <option value="Fira Code">Fira Code</option>
                                <option value="Space Mono">Space Mono</option>
                            </select>
                        </label>
                        <label>
                            Date Font:
                            <select id="date-font">
                                <option value="Orbitron">Orbitron</option>
                                <option value="Rajdhani" selected>Rajdhani</option>
                                <option value="Roboto">Roboto</option>
                                <option value="Open Sans">Open Sans</option>
                                <option value="Lato">Lato</option>
                                <option value="Montserrat">Montserrat</option>
                                <option value="Oswald">Oswald</option>
                                <option value="Raleway">Raleway</option>
                                <option value="Poppins">Poppins</option>
                                <option value="Inter">Inter</option>
                                <option value="Pacifico">Pacifico</option>
                                <option value="Bebas Neue">Bebas Neue</option>
                                <option value="Playfair Display">Playfair Display</option>
                                <option value="Merriweather">Merriweather</option>
                                <option value="Nunito">Nunito</option>
                                <option value="Ubuntu">Ubuntu</option>
                                <option value="Roboto Mono">Roboto Mono</option>
                                <option value="Dancing Script">Dancing Script</option>
                                <option value="Cinzel">Cinzel</option>
                                <option value="Josefin Sans">Josefin Sans</option>
                                <option value="Quicksand">Quicksand</option>
                                <option value="Anton">Anton</option>
                                <option value="Righteous">Righteous</option>
                                <option value="Lobster">Lobster</option>
                                <option value="Caveat">Caveat</option>
                                <option value="Exo 2">Exo 2</option>
                                <option value="Fira Code">Fira Code</option>
                                <option value="Space Mono">Space Mono</option>
                            </select>
                        </label>
                        <div class="color-pickers">
                            <label>
                                Clock Color:
                                <input type="color" id="clock-color" value="#ffffff">
                            </label>
                            <label>
                                Date Color:
                                <input type="color" id="date-color" value="#f0f0f0">
                            </label>
                        </div>
                        <label style="margin-top: 10px; display: block;">
                            Layout Position:
                            <select id="clock-position">
                                <option value="pos-top">Top</option>
                                <option value="pos-center" selected>Center</option>
                                <option value="pos-bottom">Bottom</option>
                            </select>
                        </label>
                    </div>

                    <div class="settings-section">
                        <h4>Custom Texts & Todos</h4>
                        <label>
                            Add Note:
                            <input type="text" id="custom-text-input" placeholder="e.g. Focus on goals">
                        </label>
                        <div class="color-pickers" style="margin-bottom: 10px; margin-top: 5px;">
                            <label>
                                Font:
                                <select id="custom-text-font">
                                    <option value="Orbitron">Orbitron</option>
                                    <option value="Rajdhani" selected>Rajdhani</option>
                                    <option value="Roboto">Roboto</option>
                                    <option value="Open Sans">Open Sans</option>
                                    <option value="Lato">Lato</option>
                                    <option value="Montserrat">Montserrat</option>
                                    <option value="Oswald">Oswald</option>
                                    <option value="Raleway">Raleway</option>
                                    <option value="Poppins">Poppins</option>
                                    <option value="Inter">Inter</option>
                                    <option value="Pacifico">Pacifico</option>
                                    <option value="Bebas Neue">Bebas Neue</option>
                                    <option value="Playfair Display">Playfair Display</option>
                                    <option value="Merriweather">Merriweather</option>
                                    <option value="Nunito">Nunito</option>
                                    <option value="Ubuntu">Ubuntu</option>
                                    <option value="Roboto Mono">Roboto Mono</option>
                                    <option value="Dancing Script">Dancing Script</option>
                                    <option value="Cinzel">Cinzel</option>
                                    <option value="Josefin Sans">Josefin Sans</option>
                                    <option value="Quicksand">Quicksand</option>
                                    <option value="Anton">Anton</option>
                                    <option value="Righteous">Righteous</option>
                                    <option value="Lobster">Lobster</option>
                                    <option value="Caveat">Caveat</option>
                                    <option value="Exo 2">Exo 2</option>
                                    <option value="Fira Code">Fira Code</option>
                                    <option value="Space Mono">Space Mono</option>
                                </select>
                            </label>
                            <label>
                                Color:
                                <input type="color" id="custom-text-color" value="#ffffff">
                            </label>
                        </div>
                        <button id="add-custom-text-btn">Add Text</button>
                        <div id="custom-texts-list" class="local-bg-list"></div>
                    </div>

                    <div class="settings-section">
                        <h4>Backgrounds</h4>
                        <label>
                            Change Interval (minutes):
                            <input type="number" id="interval-input" min="1" max="60" value="5">
                        </label>
                        <label class="checkbox-label">
                    <input type="checkbox" id="use-local-storage">
                    <span>Use Local Backgrounds</span>
                </label>
                <div id="local-bg-section" class="local-bg-section hidden">
                    <label class="file-input-label">
                        Browse Local Images:
                        <input type="file" id="file-input" accept="image/*" multiple>
                        <span class="file-btn">Choose Images</span>
                    </label>
                    <label>
                        Or Add Image URL:
                        <input type="text" id="bg-url-input" placeholder="https://example.com/image.jpg">
                    </label>
                    <button id="add-bg-btn">Add URL</button>
                    <div id="local-bg-list" class="local-bg-list"></div>
                </div>
                    </div> <!-- End Settings Section Backgrounds -->
                </div> <!-- End Scroll Area -->
                <button id="save-settings">Save Settings</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
